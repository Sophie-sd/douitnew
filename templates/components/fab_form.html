{% load i18n %}
<form class="fab-form"
      hx-post="{% url 'leads:submit_fab' %}"
      hx-target="this"
      hx-swap="outerHTML"
      hx-indicator="find .fab-form__btn"
      hx-history="false">
  {% csrf_token %}

  {% if rate_limited %}
  <p class="fab-form__error">{% trans "Забагато заявок. Спробуйте пізніше." %}</p>
  {% endif %}

  <div class="fab-form__field">
    <input class="fab-form__input"
           type="text"
           name="name"
           placeholder="{% trans "Ваше ім'я" %}"
           autocomplete="name"
           required
           {% if form and form.name.value %}value="{{ form.name.value }}"{% endif %}>
    {% if form and form.name.errors %}
    <p class="fab-form__error">{{ form.name.errors.0 }}</p>
    {% endif %}
  </div>

  <div class="fab-form__field">
    <input class="fab-form__input"
           type="tel"
           name="contact"
           placeholder="+38(0__)___-__-__"
           autocomplete="tel"
           data-phone-ua
           required
           {% if form and form.contact.value %}value="{{ form.contact.value }}"{% endif %}>
    {% if form and form.contact.errors %}
    <p class="fab-form__error">{{ form.contact.errors.0 }}</p>
    {% endif %}
  </div>

  <label class="fab-form__consent">
    <input class="lead-form__checkbox" type="checkbox" required>
    <span>{% trans "Погоджуюсь з" %}
      <a href="{% url 'core:legal_privacy' %}" class="lead-form__consent-link" target="_blank" rel="noopener noreferrer">{% trans "політикою конфіденційності" %}</a>
    </span>
  </label>

  <!-- Honeypot -->
  <div class="sr-only" aria-hidden="true">
    <input type="text" name="website" tabindex="-1" autocomplete="off">
  </div>
  <input type="hidden" name="utm_source" data-utm="source">
  <input type="hidden" name="utm_medium" data-utm="medium">
  <input type="hidden" name="utm_campaign" data-utm="campaign">
  <input type="hidden" name="source_url" data-utm="url">

  <button type="submit" class="fab-form__btn btn btn--primary btn--block">
    {% trans "Передзвоніть мені" %}
  </button>
</form>
