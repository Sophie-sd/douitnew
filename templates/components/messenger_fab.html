{% load i18n %}
<div class="messenger-fab" id="messenger-fab" aria-label="{% trans "Зв'язатися з нами" %}">

  <div class="messenger-fab__panel" role="group" aria-label="{% trans "Варіанти зв'язку" %}">

    <div class="messenger-fab__links">
      <a href="tel:+380686119150" class="messenger-fab__link" aria-label="{% trans "Зателефонувати" %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12.5 19.79 19.79 0 0 1 1.68 4a2 2 0 0 1 1.95-2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span>+38(068) 611-91-50</span>
      </a>
      <a href="{{ site_settings.telegram_url|default:'https://t.me/douIT' }}"
         target="_blank" rel="noopener noreferrer"
         class="messenger-fab__link" aria-label="{% trans "Написати в Telegram" %}">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 13.617l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.942z"/>
        </svg>
        <span>Telegram</span>
      </a>
    </div>

  </div>

  <button class="messenger-fab__trigger"
          aria-label="{% trans "Зв'язатися з нами" %}"
          aria-expanded="false"
          data-fab-toggle>
    <svg class="messenger-fab__icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <svg class="messenger-fab__icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>

</div>
