{% extends "base.html" %}
{% load i18n %}

{% block main_class %}legal-main{% endblock %}

{% block extra_head %}
<meta name="robots" content="noindex, follow">
{% endblock %}

{% block content %}
<article class="legal-page container">
  <h1 class="legal-page__title">{% block legal_title %}{% endblock %}</h1>
  <div class="legal-page__body">
    {% block legal_body %}
    <p class="legal-page__placeholder">{% trans "Вміст буде опубліковано незабаром." %}</p>
    {% endblock %}
  </div>
</article>
{% endblock %}
