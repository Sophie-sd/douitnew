services:
  - type: web
    name: douit
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: douit-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: douit-db
    region: frankfurt
    plan: free
    databaseName: douit
    user: douit
